apiVersion: apps/v1
kind: Deployment
metadata:
  name: ggj-frontend
  labels:
    app: ggj-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ggj-frontend
  template:
    metadata:
      labels:
        app: ggj-frontend
    spec:
      containers:
      - name: ggj-frontend
        image: ggj-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ggj-frontend-service
spec:
  selector:
    app: ggj-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
